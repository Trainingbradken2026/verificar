<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Verificar Trabajador — Bradken Chilca</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:    #0F3460;
      --blue-m:  #1B5CA8;
      --blue-lt: #E6F1FB;
      --green:   #16a34a;
      --green-lt:#dcfce7;
      --red:     #dc2626;
      --red-lt:  #fee2e2;
      --amber:   #d97706;
      --amber-lt:#fef3c7;
      --gray:    #6b7280;
      --gray-lt: #f3f4f6;
      --border:  #e5e7eb;
      --text:    #111827;
      --text2:   #4b5563;
    }
    html, body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f0f4fa;
      color: var(--text);
    }

    /* ── HEADER ── */
    .header {
      background: var(--blue);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
      font-family: monospace; flex-shrink: 0;
    }
    .header-title { color: #fff; font-size: 15px; font-weight: 600; }
    .header-sub { color: rgba(255,255,255,0.55); font-size: 11px; margin-top: 1px; }

    /* ── CONTENEDOR ── */
    .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }

    /* ── ESTADOS ── */
    .loading { text-align: center; padding: 60px 20px; color: var(--gray); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue-m); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: var(--red-lt); border: 1px solid #fca5a5;
      border-radius: 12px; padding: 24px; text-align: center; margin-top: 20px;
    }
    .error-box .icon { font-size: 40px; margin-bottom: 12px; }
    .error-box h2 { font-size: 16px; color: var(--red); margin-bottom: 6px; }
    .error-box p { font-size: 13px; color: #7f1d1d; }

    /* ── CARD PRINCIPAL ── */
    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      margin-top: 16px;
    }

    /* Estado banner */
    .status-banner {
      padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .status-banner.autorizado { background: var(--green); }
    .status-banner.bloqueado  { background: var(--red); }
    .status-banner.restringido{ background: var(--amber); }
    .status-icon { font-size: 28px; flex-shrink: 0; }
    .status-text { color: #fff; }
    .status-label { font-size: 18px; font-weight: 700; line-height: 1; margin-bottom: 2px; }
    .status-sub   { font-size: 12px; opacity: 0.85; }

    /* Avatar + datos */
    .persona-section { padding: 20px; border-bottom: 1px solid var(--border); }
    .persona-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .avatar {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; flex-shrink: 0;
      background: var(--blue-lt); color: var(--blue-m);
    }
    .nombre { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
    .cargo  { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
    .empresa{ font-size: 12px; color: var(--text2); }

    .datos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .dato-item {
      background: var(--gray-lt);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .dato-label { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
    .dato-valor { font-size: 13px; font-weight: 600; color: var(--text); }
    .dato-valor.ok  { color: var(--green); }
    .dato-valor.warn{ color: var(--amber); }
    .dato-valor.bad { color: var(--red); }

    /* Secciones */
    .section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .section:last-child { border-bottom: none; }
    .section-title {
      font-size: 11px; font-weight: 700; color: var(--gray);
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px;
    }

    /* Autorizaciones */
    .auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .auth-item {
      border-radius: 8px;
      padding: 10px 12px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .auth-item.vigente  { background: var(--green-lt); border: 1px solid #86efac; }
    .auth-item.proximo  { background: var(--amber-lt); border: 1px solid #fcd34d; }
    .auth-item.vencido  { background: var(--red-lt);   border: 1px solid #fca5a5; }
    .auth-item.none     { background: var(--gray-lt);  border: 1px solid var(--border); opacity: 0.5; }
    .auth-icon-name { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .auth-venc { font-size: 10px; color: var(--text2); margin-top: 1px; }
    .auth-tag  { font-size: 10px; font-weight: 600; margin-top: 3px; }
    .auth-tag.vigente  { color: var(--green); }
    .auth-tag.proximo  { color: var(--amber); }
    .auth-tag.vencido  { color: var(--red); }
    .auth-tag.none     { color: var(--gray); }

    .sin-auth {
      text-align: center; padding: 16px;
      color: var(--gray); font-size: 13px;
      background: var(--gray-lt); border-radius: 8px;
    }

    /* SCTR / Inducción badges */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .badge.green { background: var(--green-lt); color: var(--green); }
    .badge.amber { background: var(--amber-lt); color: var(--amber); }
    .badge.red   { background: var(--red-lt);   color: var(--red); }
    .badge.gray  { background: var(--gray-lt);  color: var(--gray); }

    /* Footer */
    .footer {
      text-align: center; padding: 24px 16px;
      font-size: 10px; color: var(--gray);
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    /* No auth (sin permisos) */
    .no-id {
      text-align: center; padding: 60px 20px;
    }
    .no-id .icon { font-size: 50px; margin-bottom: 16px; }
    .no-id h2 { font-size: 18px; font-weight: 700; color: var(--blue); margin-bottom: 8px; }
    .no-id p  { font-size: 13px; color: var(--text2); line-height: 1.6; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">BK</div>
  <div>
    <div class="header-title">Verificación de Trabajador</div>
    <div class="header-sub">Bradken Chilca · Sistema de Control de Acceso</div>
  </div>
</div>

<div class="wrap">
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div>Consultando información...</div>
    </div>
  </div>
</div>

<div class="footer">
  Bradken Chilca · Sistema de Control de Acceso · Verificación QR
</div>

<script>
const SUPA_URL = "https://pxqbwxoqjzyadlyivkop.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cWJ3eG9xanp5YWRseWl2a29wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NDk3NDYsImV4cCI6MjA5NDAyNTc0Nn0.8PU79Wmr9XnOxWb8otvKS6JUpwY9oaO06xgWUepkbzk";

const AUTH_TRABAJOS = [
  { id: "alturas",    label: "Trab. en Alturas",  icon: "🧗" },
  { id: "excavacion", label: "Excavación",         icon: "⛏" },
  { id: "caliente",   label: "Trab. en Caliente",  icon: "🔥" },
  { id: "confinados", label: "Esp. Confinados",    icon: "🕳" },
  { id: "lototo",     label: "LOTOTO",             icon: "🔒" },
  { id: "izaje",      label: "Izaje de Cargas",    icon: "🏗" },
];
const AUTH_EQUIPOS = [
  { id: "montacargas",  label: "Montacargas",       icon: "🚜" },
  { id: "grua",         label: "Grúa Telescópica",  icon: "🏗" },
  { id: "rigger",       label: "Rigger",            icon: "⛓" },
  { id: "excavadora",   label: "Excavadora",        icon: "🚧" },
  { id: "manlift",      label: "Manlift",           icon: "🦺" },
  { id: "tijera",       label: "Elev. de Tijera",   icon: "✂" },
];
const AUTH_TODAS = [...AUTH_TRABAJOS, ...AUTH_EQUIPOS];

function hoy() { return new Date().toISOString().split("T")[0]; }
function diasRestantes(fecha) {
  if (!fecha) return null;
  return Math.floor((new Date(fecha) - new Date(hoy())) / 86400000);
}
function fmtFecha(f) {
  if (!f) return "—";
  const [y, m, d] = f.split("-");
  return d + "/" + m + "/" + y;
}

async function cargar() {
  const params = new URLSearchParams(window.location.search);
  const pid = params.get("id") || params.get("pid");
  const app = document.getElementById("app");

  if (!pid) {
    app.innerHTML = `
      <div class="no-id">
        <div class="icon">🪪</div>
        <h2>Verificación QR Bradken</h2>
        <p>Esta página verifica el estado de un trabajador escaneando el código QR de su casco.<br><br>Si llegaste aquí sin escanear un QR, contacta al área de Safety o Vigilancia.</p>
      </div>`;
    return;
  }

  try {
    // Buscar persona
    const r1 = await fetch(
      `${SUPA_URL}/rest/v1/personas?id=eq.${encodeURIComponent(pid)}&select=*`,
      { headers: { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY } }
    );
    const personas = await r1.json();

    if (!personas || personas.length === 0) {
      app.innerHTML = `
        <div class="error-box">
          <div class="icon">❌</div>
          <h2>Trabajador no encontrado</h2>
          <p>El código QR escaneado no corresponde a ningún trabajador registrado en el sistema.<br><br>ID consultado: <strong>${pid}</strong></p>
        </div>`;
      return;
    }

    const p = personas[0];

    // Buscar empresa
    let empresa = null;
    if (p.emp_id) {
      const r2 = await fetch(
        `${SUPA_URL}/rest/v1/empresas?id=eq.${encodeURIComponent(p.emp_id)}&select=*`,
        { headers: { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY } }
      );
      const emps = await r2.json();
      if (emps && emps.length > 0) empresa = emps[0];
    }

    // Buscar acceso activo (en planta)
    const r3 = await fetch(
      `${SUPA_URL}/rest/v1/accesos?pid=eq.${encodeURIComponent(pid)}&salida=is.null&select=*&order=ingreso.desc&limit=1`,
      { headers: { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY } }
    );
    const accesos = await r3.json();
    const enPlanta = accesos && accesos.length > 0;
    const acceso = enPlanta ? accesos[0] : null;

    // Calcular estados
    const bloqueado = p.bloqueado === true;
    const sctrVenc = p.sctr_vencimiento;
    const sctrDias = diasRestantes(sctrVenc);
    const sctrSt = !sctrVenc ? "none" : sctrDias < 0 ? "vencido" : sctrDias <= 30 ? "proximo" : "vigente";

    const inducFecha = p.induccion;
    let indVenc = null;
    if (inducFecha) {
      const ind = new Date(inducFecha);
      ind.setFullYear(ind.getFullYear() + 1);
      indVenc = ind.toISOString().split("T")[0];
    }
    const indDias = diasRestantes(indVenc);
    const indSt = !indVenc ? "none" : indDias < 0 ? "vencido" : indDias <= 30 ? "proximo" : "vigente";

    // Días restantes en planta
    const diasPlanta = diasRestantes(p.fecha_venc_planta);

    // Autorizaciones
    const auths = (typeof p.autorizaciones === "string" ? JSON.parse(p.autorizaciones) : p.autorizaciones) || {};

    // Iniciales para avatar
    const iniciales = (p.nombre || "").split(" ").map(w => w[0]).slice(0, 2).join("").toUpperCase();

    // Estado general
    let estadoGlobal = "autorizado";
    let estadoLabel = "✅ Autorizado para ingresar";
    let estadoSub = "Todos los requisitos están al día";
    if (bloqueado) {
      estadoGlobal = "bloqueado";
      estadoLabel = "🚫 Suspendido";
      estadoSub = "No puede ingresar a planta. Contacte a Vigilancia.";
    } else if (sctrSt === "vencido" || sctrSt === "none") {
      estadoGlobal = "bloqueado";
      estadoLabel = "⛔ SCTR vencido o sin registro";
      estadoSub = "No puede ingresar hasta renovar el SCTR.";
    } else if (indSt === "vencido" || indSt === "none") {
      estadoGlobal = "bloqueado";
      estadoLabel = "⛔ Sin inducción vigente";
      estadoSub = "Debe renovar la inducción de sitio con Safety.";
    } else if (diasPlanta !== null && diasPlanta < 0) {
      estadoGlobal = "bloqueado";
      estadoLabel = "📅 Autorización vencida";
      estadoSub = "El período en planta venció. Debe renovar el registro.";
    } else if (sctrSt === "proximo" || indSt === "proximo") {
      estadoGlobal = "restringido";
      estadoLabel = "⚠ Autorizado con alertas";
      estadoSub = "Puede ingresar, pero hay documentos próximos a vencer.";
    }

    // Render de autorizaciones
    const authItems = AUTH_TODAS.map(a => {
      const fecha = auths[a.id];
      const dias = diasRestantes(fecha);
      const st = !fecha ? "none" : dias < 0 ? "vencido" : dias <= 30 ? "proximo" : "vigente";
      const stLabel = { vigente: "✅ Vigente", proximo: "⚠ Por vencer", vencido: "❌ Vencida", none: "Sin autorización" };
      return `
        <div class="auth-item ${st}">
          <div class="auth-icon-name">${a.icon} <span>${a.label}</span></div>
          ${fecha ? `<div class="auth-venc">Vence: ${fmtFecha(fecha)}</div>` : ""}
          <div class="auth-tag ${st}">${stLabel[st]}</div>
        </div>`;
    }).join("");

    const authVigentes = AUTH_TODAS.filter(a => { const d = diasRestantes(auths[a.id]); return d !== null && d >= 0; });
    const tieneAuth = authVigentes.length > 0;

    // Badge SCTR
    const sctrLabel = { vigente: "✅ Vigente", proximo: "⚠ Por vencer", vencido: "❌ Vencido", none: "Sin registro" };
    const sctrColor = { vigente: "green", proximo: "amber", vencido: "red", none: "gray" };
    const indLabel  = { vigente: "✅ Vigente", proximo: "⚠ Por vencer", vencido: "❌ Vencida",  none: "Sin inducción" };
    const indColor  = { vigente: "green", proximo: "amber", vencido: "red", none: "gray" };

    app.innerHTML = `
      <div class="card">
        <div class="status-banner ${estadoGlobal}">
          <div class="status-icon">${estadoGlobal === "autorizado" ? "✅" : estadoGlobal === "restringido" ? "⚠️" : "🚫"}</div>
          <div class="status-text">
            <div class="status-label">${estadoLabel}</div>
            <div class="status-sub">${estadoSub}</div>
          </div>
        </div>

        <div class="persona-section">
          <div class="persona-top">
            <div class="avatar">${iniciales}</div>
            <div>
              <div class="nombre">${p.nombre || "—"}</div>
              <div class="cargo">${p.cargo || "Sin cargo"}</div>
              <div class="empresa">${(empresa && empresa.razon_social) || (empresa && empresa.razonSocial) || "—"}</div>
            </div>
          </div>
          <div class="datos-grid">
            <div class="dato-item">
              <div class="dato-label">Tipo / Doc.</div>
              <div class="dato-valor">${p.tipo_doc || "DNI"}: ${p.dni || "—"}</div>
            </div>
            <div class="dato-item">
              <div class="dato-label">Tipo contrato</div>
              <div class="dato-valor">${p.tipo === "contratista" ? "Contratista" : p.tipo === "induccion" ? "Inducción sitio" : "Visitante"}</div>
            </div>
            <div class="dato-item">
              <div class="dato-label">Estado en planta</div>
              <div class="dato-valor ${enPlanta ? 'ok' : 'warn'}">${enPlanta ? "🟢 En planta" : "⚪ Fuera de planta"}</div>
            </div>
            <div class="dato-item">
              <div class="dato-label">Días restantes</div>
              <div class="dato-valor ${diasPlanta === null ? '' : diasPlanta < 0 ? 'bad' : diasPlanta <= 5 ? 'warn' : 'ok'}">
                ${diasPlanta === null ? "—" : diasPlanta < 0 ? "Vencido" : diasPlanta + " días"}
              </div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Documentos</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
            <div>
              <div style="font-size:11px;color:var(--gray);margin-bottom:4px">SCTR</div>
              <span class="badge ${sctrColor[sctrSt]}">${sctrLabel[sctrSt]}</span>
              ${sctrVenc ? `<div style="font-size:10px;color:var(--text2);margin-top:3px">Vence: ${fmtFecha(sctrVenc)}</div>` : ""}
            </div>
            <div>
              <div style="font-size:11px;color:var(--gray);margin-bottom:4px">Inducción</div>
              <span class="badge ${indColor[indSt]}">${indLabel[indSt]}</span>
              ${indVenc ? `<div style="font-size:10px;color:var(--text2);margin-top:3px">Vence: ${fmtFecha(indVenc)}</div>` : ""}
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">🔐 Autorizaciones (${authVigentes.length} vigentes)</div>
          ${tieneAuth
            ? `<div class="auth-grid">${AUTH_TODAS.filter(a => auths[a.id]).map(a => {
                const fecha = auths[a.id];
                const dias = diasRestantes(fecha);
                const st = dias < 0 ? "vencido" : dias <= 30 ? "proximo" : "vigente";
                const stLabel = { vigente: "✅ Vigente", proximo: "⚠ Por vencer", vencido: "❌ Vencida" };
                return `<div class="auth-item ${st}">
                  <div class="auth-icon-name">${a.icon} <span>${a.label}</span></div>
                  <div class="auth-venc">Vence: ${fmtFecha(fecha)}</div>
                  <div class="auth-tag ${st}">${stLabel[st]}</div>
                </div>`;
              }).join("")}</div>`
            : `<div class="sin-auth">🔐 Sin autorizaciones de trabajos especiales registradas</div>`
          }
        </div>

        ${enPlanta && acceso ? `
        <div class="section">
          <div class="section-title">Acceso actual</div>
          <div style="font-size:12px;color:var(--text2)">
            Ingresó: <strong>${new Date(acceso.ingreso).toLocaleString("es-PE")}</strong><br>
            Tipo: <strong>${acceso.tipo_ingreso || "—"}</strong><br>
            ${acceso.agente_ingreso ? "Agente: <strong>" + acceso.agente_ingreso + "</strong>" : ""}
          </div>
        </div>` : ""}

        <div class="section" style="background:var(--gray-lt);border-top:1px solid var(--border)">
          <div style="font-size:10px;color:var(--gray);text-align:center">
            ID: ${p.id} · Consultado: ${new Date().toLocaleString("es-PE")}
          </div>
        </div>
      </div>`;

  } catch(err) {
    document.getElementById("app").innerHTML = `
      <div class="error-box">
        <div class="icon">⚠️</div>
        <h2>Error al consultar</h2>
        <p>No se pudo obtener la información. Verifica tu conexión a internet e intenta de nuevo.<br><br><small>${err.message}</small></p>
      </div>`;
  }
}

cargar();
</script>
</body>
</html>
